name: Deploy to Cloudflare

# Deploys the Worker on every push to main (and on demand). This replaces the
# dashboard's Git-build integration, which proved unreliable. Requires ONE repo
# secret: CLOUDFLARE_API_TOKEN ("Edit Cloudflare Workers" template).
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cloudflare-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build OpenNext bundle
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://irishgrid.com
          NEXT_PUBLIC_SUPABASE_URL: https://blfygbmfpkrnaxrqcwhu.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJsZnlnYm1mcGtybmF4cnFjd2h1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI5MjIwMDEsImV4cCI6MjA5ODQ5ODAwMX0.PpTMQWHRAOEnblC6vHmp0QppM9Gg9hXsJUeLNkWn0u8
      - name: Deploy Worker
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: b1916a8694208875b44114d14aa3a9c6
