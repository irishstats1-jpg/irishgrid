# Cloudflare Workers config for the OpenNext build (§3, §9).
# Deploy:  npm run deploy   (runs opennextjs-cloudflare build && deploy)
# Preview: npm run preview
#
# Set secrets with `wrangler secret put <NAME>` (SUPABASE_SERVICE_ROLE_KEY,
# OPENAI_API_KEY, RESEND_API_KEY, MAKE_SOCIAL_WEBHOOK_SECRET) and public vars
# (NEXT_PUBLIC_*) in the [vars] block or the dashboard.

# Name must match the Worker created in the Cloudflare dashboard.
name = "irishgrid"
main = "custom-worker.js"
compatibility_date = "2024-12-30"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]

# Route the Worker at the custom domain (the zone lives on this Cloudflare
# account). No workers.dev subdomain is registered, so disable that publish
# target — the custom domain is the only route.
workers_dev = false
routes = [
  { pattern = "irishgrid.com", custom_domain = true },
]

# Note: `npm run build` produces the OpenNext bundle (.open-next/). wrangler 4
# delegates `wrangler deploy` to `opennextjs-cloudflare deploy`, which expects
# that bundle to already exist — so build must run before deploy.

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[observability]
enabled = true

# Hourly ingestion + daily milestone job (§9). The scheduled handler hits
# /api/cron/ingest; set MAKE_SOCIAL_WEBHOOK_SECRET so the call is authorized.
[triggers]
crons = ["0 * * * *", "15 6 * * *"]

# Plain-text vars are REPLACED by wrangler deploy, so public config lives here.
# Secrets (SUPABASE_SERVICE_ROLE_KEY, MAKE_SOCIAL_WEBHOOK_SECRET, RESEND/OPENAI
# keys) must be set as dashboard Secrets (encrypted) — those survive deploys.
[vars]
NEXT_PUBLIC_SITE_URL = "https://irishgrid.com"
DEFAULT_LOCALE = "en"
NEXT_PUBLIC_SUPABASE_URL = "https://blfygbmfpkrnaxrqcwhu.supabase.co"
