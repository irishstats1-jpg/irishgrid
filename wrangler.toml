# Cloudflare Workers config for the OpenNext build (§3, §9).
# Deploy:  npm run deploy   (runs opennextjs-cloudflare build && deploy)
# Preview: npm run preview
#
# Set secrets with `wrangler secret put <NAME>` (SUPABASE_SERVICE_ROLE_KEY,
# OPENAI_API_KEY, RESEND_API_KEY, MAKE_SOCIAL_WEBHOOK_SECRET) and public vars
# (NEXT_PUBLIC_*) in the [vars] block or the dashboard.

# Name must match the Worker created in the Cloudflare dashboard.
name = "irishgrid"
main = "custom-worker.js"
compatibility_date = "2024-12-30"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]

# Safety net: ensures the OpenNext build runs even if the dashboard build
# command is empty — `wrangler deploy` executes this first.
[build]
command = "npx opennextjs-cloudflare build"

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[observability]
enabled = true

# Hourly ingestion + daily milestone job (§9). The scheduled handler hits
# /api/cron/ingest; set MAKE_SOCIAL_WEBHOOK_SECRET so the call is authorized.
[triggers]
crons = ["0 * * * *", "15 6 * * *"]

[vars]
NEXT_PUBLIC_SITE_URL = "https://irishgrid.com"
DEFAULT_LOCALE = "en"
# NEXT_PUBLIC_SUPABASE_URL / NEXT_PUBLIC_SUPABASE_ANON_KEY / NEXT_PUBLIC_ANALYTICS_DOMAIN
# can be set here or in the dashboard.
